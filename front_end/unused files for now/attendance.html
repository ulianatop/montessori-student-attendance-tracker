<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Attendance</title>
    <style>
        body {
            background-image: url(background.jpg);
            background-size: auto;
            background-position: center;
        }
        h1 {
            font-family: Georgia, serif;
            text-align: center;
            font-size: 50px;
            color: yellow;
        }

        p{
            color: cyan;
        }

        label {
            font-family: Georgia, serif;
            color: black;
            font-weight: bold;
        }
        .center {
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: yellow;
            box-sizing: border-box;
        }
        .right{
            display: flex;
            justify-content: center;
        }
        .buttons {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
       
    </style>
</head>
<body>
<h1>Administrative Tasks</h1>
<div class="center">
        <span style="padding:4px; border: 1px solid yellow;">
            <p id="student">Which task do you want to do?</p>
            <div class="right">
            <label> John Deer</label>
            <input type="checkbox" id="child1" value="Child #1">
            </div>
            <div class="right">
            <label> Sally Mae</label>
            <input type="checkbox" id="child2" value="Child #2">
            </div>
            <div class="right">
            <label> Freddie Mac</label>
            <input type="checkbox" id="child3" value="Child #3">
            </div>
            <div class="right">
            <label> Clint Eastwood</label>
            <input type="checkbox" id="child4" value="Child #4">
            </div>
            <div class="right">
            <label> Dom Delouise</label>
            <input type="checkbox" id="child5" value="Child #5">
            </div>
            <div class="buttons">
                <input type="submit" value="Drop Off">
                <input type="submit" value="Pick Up">
            </div>
        </span>
    </div>
</body>
</html>
